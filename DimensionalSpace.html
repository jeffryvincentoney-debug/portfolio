<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rift Knight (Prototype)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#0b0b12; }
canvas { display:block; }
#ui {
  position:absolute; top:12px; left:12px;
  color:#fff; font-family:'Courier New', monospace; font-size:15px;
  display:flex; gap:20px; align-items:center;
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
}
.bar-wrap { display:flex; align-items:center; gap:8px; }
.bar { width:120px; height:12px; background:#333; border:1px solid #555; border-radius:3px; overflow:hidden; }
.bar-fill { height:100%; border-radius:3px; transition: width 0.1s; }
#hp-fill  { background: linear-gradient(90deg,#e33,#f66); }
#cd-attack-fill { background: linear-gradient(90deg,#f90,#fd0); }
#cd-dash-fill   { background: linear-gradient(90deg,#39f,#0cf); }
#prompt {
  position:absolute; bottom:40px; left:50%;
  transform:translateX(-50%);
  color:#ddd; font-family:'Courier New', monospace; font-size:15px;
  background:rgba(0,0,0,0.55); padding:6px 16px; border-radius:6px;
  border:1px solid #555; display:none;
  text-shadow: 0 0 6px #fff;
}
</style>
</head>
<body>

<div id="ui">
  <div class="bar-wrap">HP <div class="bar"><div class="bar-fill" id="hp-fill"></div></div></div>
  <div class="bar-wrap">Atk <div class="bar"><div class="bar-fill" id="cd-attack-fill"></div></div></div>
  <div class="bar-wrap">Dash <div class="bar"><div class="bar-fill" id="cd-dash-fill"></div></div></div>
  <span id="money">💰 0</span>
</div>

<div id="prompt">Press E to enter the Rift</div>

<canvas id="c"></canvas>

<script>
// ─── canvas setup ────────────────────────────────────────────────
const c   = document.getElementById("c");
const ctx = c.getContext("2d");
c.width   = window.innerWidth;
c.height  = window.innerHeight;

window.addEventListener("resize", () => {
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
});

// ─── images ──────────────────────────────────────────────────────
function loadImg(src){ const i=new Image(); i.src=src; return i; }
const bg       = loadImg("background.png");
const bg2      = loadImg("background2.png");
const idleImg  = loadImg("lilDudeidle.png");
const walk1    = loadImg("lilDudewalkanim1.png");
const walk2    = loadImg("lilDudewalkanim2.png");
const portalImg= loadImg("rift.png");
const slashImg = loadImg("slash.png");

// ─── input ───────────────────────────────────────────────────────
const keys  = {};
const mouse = { x:0, y:0, clicked:false };

window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === "e" && nearPortal) enterPortal();
});
window.addEventListener("keyup",   e => { keys[e.key.toLowerCase()] = false; });

c.addEventListener("mousemove", e => {
  const r = c.getBoundingClientRect();
  mouse.x = e.clientX - r.left + camX;
  mouse.y = e.clientY - r.top;
});

c.addEventListener("mousedown", e => {
  if (e.button === 0) mouse.clicked = true;
});

// ─── constants ───────────────────────────────────────────────────
const GRAVITY        = 0.8;
const ATTACK_COOLDOWN = 18;
const DASH_COOLDOWN   = 50;
const DASH_DURATION   = 12;
const SLASH_DURATION  = 10;

// ─── state ───────────────────────────────────────────────────────
let camX      = 0;
let world     = 1;
let nearPortal= false;
let frame     = 0;
let frameTimer= 0;
let nearPortal2 = false;

const spawn = { x:100, y:200 };

const player = {
  x:100, y:200, w:40, h:60,
  vx:0,  vy:0,
  speed:5, jumpForce:-14,
  onGround:false,
  hp:100, money:0,
  facing:1,
  invTimer:   0,
  attackTimer:0,
  attackActive:0,
  dashTimer:  0,
  dashActive: 0,
  slashTimer: 0,
  slashX:0, slashY:0, slashAngle:0
};

const upgrades = {
  hpCost: 50,
  speedCost: 75,
  damageCost: 100
};

let damageLevel = 1;

const platforms = [
  {x:0,    y:600, w:5000, h:600},
  {x:400,  y:450, w:200,  h:20},
  {x:800,  y:380, w:200,  h:20},
  {x:1200, y:450, w:200,  h:20},
  {x:1600, y:350, w:200,  h:20},
  {x:2000, y:500, w:200,  h:20}
];

// Fixed spawn points for world 2 enemies
const ENEMY_SPAWNS = [
  {x:600,  y:520},
  {x:1000, y:340},
  {x:1500, y:410}
];

// Each enemy: active=false in world 1, respawnTimer counts down before reappearing
const enemies = ENEMY_SPAWNS.map(s => ({
  x: s.x, y: s.y, w:40, h:40,
  hp:3, maxHp:3,
  spawnX: s.x, spawnY: s.y,
  active: false,       // enemies are inactive until world 2 loads
  respawnTimer: 0      // counts down frames before respawning
}));

// World 1 -> World 2
const portal = {
  x:2800,
  y:480,
  w:120,
  h:120
};

// World 2 -> World 1
const portal2 = {
  x:2500,
  y:480,
  w:120,
  h:120
};

const shop = {
  x:700,
  y:500,
  w:100,
  h:100
};

let nearShop = false;

// ─── helpers ─────────────────────────────────────────────────────
function aabb(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x &&
         a.y < b.y+b.h && a.y+a.h > b.y;
}

function reset(){
  player.x  = spawn.x;
  player.y  = spawn.y;
  player.vx = 0; player.vy = 0;
  player.hp = 100;
  player.invTimer    = 0;
  player.attackTimer = 0;
  player.attackActive= 0;
  player.dashTimer   = 0;
  player.dashActive  = 0;
  player.slashTimer  = 0;
  camX = 0;
}

function enterPortal(){
  world++;
  spawn.x = 200; spawn.y = 200;
  portal.x = 9999;
  reset();
  // Activate enemies now that world 2 has loaded, with a staggered delay
  if (world === 2) {
    enemies.forEach((e, i) => {
      e.active = false;
      e.hp = e.maxHp;
      e.x = e.spawnX;
      e.y = e.spawnY;
      e.respawnTimer = 90 + i * 30; // stagger: 1.5s, 2s, 2.5s
    });
  }
}

// ─── update ──────────────────────────────────────────────────────
function update(){
  if (player.invTimer    > 0) player.invTimer--;
  if (player.attackTimer > 0) player.attackTimer--;
  if (player.attackActive> 0) player.attackActive--;
  if (player.dashTimer   > 0) player.dashTimer--;
  if (player.dashActive  > 0) player.dashActive--;
  if (player.slashTimer  > 0) player.slashTimer--;

  if (keys["q"] && player.dashTimer === 0){
    player.dashActive = DASH_DURATION;
    player.dashTimer  = DASH_COOLDOWN;
    player.invTimer   = DASH_DURATION;
  }

  const sp    = player.dashActive > 0 ? 14 : player.speed;
  const moving= keys["a"] || keys["d"];
  player.vx   = 0;

  if (keys["a"]){ player.vx = -sp; player.facing = -1; }
  if (keys["d"]){ player.vx =  sp; player.facing =  1; }

  if (moving){
    frameTimer++;
    if (frameTimer > 10){ frame = (frame+1)%2; frameTimer=0; }
  } else { frame=0; frameTimer=0; }

  if (keys[" "] && player.onGround){
    player.vy      = player.jumpForce;
    player.onGround= false;
  }

  if (mouse.clicked){
    mouse.clicked = false;
    if (player.attackTimer === 0){
      player.attackTimer  = ATTACK_COOLDOWN;
      player.attackActive = 8;

      const cx  = player.x + player.w/2;
      const cy  = player.y + player.h/2;
      const dx  = mouse.x - cx;
      const dy  = mouse.y - cy;
      const len = Math.sqrt(dx*dx+dy*dy) || 1;

      const range = 70;
      player.slashX     = cx + (dx/len)*range;
      player.slashY     = cy + (dy/len)*range;
      player.slashAngle = Math.atan2(dy, dx);
      player.slashTimer = SLASH_DURATION;
    }
  }

  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;
  player.onGround = false;

  platforms.forEach(p => {
    const landedTop =
      player.x + player.w > p.x &&
      player.x            < p.x + p.w &&
      player.y + player.h > p.y &&
      player.y + player.h < p.y + 30 &&
      player.vy > 0;
    if (landedTop){
      player.y        = p.y - player.h;
      player.vy       = 0;
      player.onGround = true;
    }
  });

  const pcx = player.x + player.w/2;
  const pcy = player.y + player.h/2;
  const dx  = mouse.x - pcx;
  const dy  = mouse.y - pcy;
  const len = Math.sqrt(dx*dx+dy*dy) || 1;
  const range = 90;
  const hitbox = {
    x: pcx + (dx/len)*range - 25,
    y: pcy + (dy/len)*range - 25,
    w:50, h:50
  };

  enemies.forEach(e => {
    // World 1: enemies never active
    if (world === 1) return;

    // Counting down to spawn/respawn
    if (!e.active) {
      if (e.respawnTimer > 0) {
        e.respawnTimer--;
      } else {
        e.active = true;
        e.hp = e.maxHp;
        e.x = e.spawnX;
        e.y = e.spawnY;
      }
      return;
    }

    // Active enemy logic
    const ex = e.x + e.w/2, ey = e.y + e.h/2;
    const edx = pcx - ex, edy = pcy - ey;
    const ed  = Math.sqrt(edx*edx+edy*edy) || 1;
    e.x += (edx/ed)*1.8;
    e.y += (edy/ed)*1.2;

    if (aabb(player, e) && player.invTimer === 0){
      player.hp    -= 10;
      player.invTimer = 40;
      player.x    += edx>0 ? -40 : 40;
    }

    if (player.attackActive > 0 && aabb(hitbox, e)){
      e.hp--;
      if (e.hp <= 0){
        player.money += 10;
        // Deactivate and set respawn timer (180 frames = 3 seconds)
        e.active = false;
        e.respawnTimer = 180;
      }
    }
  });

  if (player.hp <= 0 || player.y > 1200) reset();

  camX += (player.x - camX - 300) * 0.1;

  nearPortal = aabb(player, portal);

  document.getElementById("hp-fill").style.width =
    Math.max(0, player.hp) + "%";

  const atkPct = player.attackTimer === 0
    ? 100
    : (1 - player.attackTimer / ATTACK_COOLDOWN) * 100;
  document.getElementById("cd-attack-fill").style.width = atkPct + "%";

  const dashPct = player.dashTimer === 0
    ? 100
    : (1 - player.dashTimer / DASH_COOLDOWN) * 100;
  document.getElementById("cd-dash-fill").style.width = dashPct + "%";

  document.getElementById("money").textContent = "Rift Bits: " + player.money;
  document.getElementById("prompt").style.display = nearPortal ? "block" : "none";
}

// ─── draw ────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  // SWAPPED: world 1 now uses bg2, world 2 uses bg
  ctx.drawImage(world === 1 ? bg2 : bg, 0, 0, c.width, c.height);

  ctx.save();
  ctx.translate(-camX, 0);

  // SWAPPED: world 1 now uses green, world 2 uses gray
  ctx.fillStyle = world === 1 ? "#4a8c30" : "#7F7F7F";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  ctx.drawImage(portalImg, portal.x, portal.y, portal.w, portal.h);

  enemies.forEach(e => {
    if (!e.active) return;
    ctx.fillStyle = "crimson";
    ctx.fillRect(e.x, e.y, e.w, e.h);
    const barW = e.w;
    ctx.fillStyle="#333";
    ctx.fillRect(e.x, e.y-8, barW, 5);
    ctx.fillStyle="#f44";
    ctx.fillRect(e.x, e.y-8, barW*(e.hp/e.maxHp), 5);
  });

  let img = (keys["a"] || keys["d"]) ? (frame===0 ? walk1 : walk2) : idleImg;
  ctx.save();
  if (player.facing === -1){
    ctx.scale(-1, 1);
    ctx.drawImage(img, -player.x - player.w, player.y, player.w, player.h);
  } else {
    ctx.drawImage(img, player.x, player.y, player.w, player.h);
  }
  ctx.restore();

  if (player.invTimer > 0 && Math.floor(player.invTimer/4)%2 === 0){
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(player.x, player.y, player.w, player.h);
  }

  if (player.slashTimer > 0){
    const alpha = player.slashTimer / SLASH_DURATION;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(player.slashX, player.slashY);
    ctx.rotate(player.slashAngle);
    const sw = 80, sh = 80;
    ctx.drawImage(slashImg, -sw/2, -sh/2, sw, sh);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ─── loop ────────────────────────────────────────────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>
</body>
</html>
