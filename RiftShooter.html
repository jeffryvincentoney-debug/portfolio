<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RIFTFALL v2</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

canvas{
display:block;
margin:auto;
background:#05050a;
}

#shop{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
border:2px solid #9d00ff;
color:white;
padding:15px;
display:none;
box-shadow:0 0 20px #9d00ff;
}
button{margin:5px;}
</style>
</head>

<body>

<canvas id="game" width="1000" height="700"></canvas>

<div id="shop">
<h2>🌌 RIFT MERCHANT</h2>
<p id="moneyText"></p>

<button onclick="buy(25,'medkit')">Medkit +40 HP (25)</button><br>
<button onclick="buy(60,'blaster')">Plasma Blaster (60)</button><br>
<button onclick="buy(150,'rifle')">Plasma Rifle (150)</button><br>
<button onclick="buy(300,'cannon')">Rift Cannon (300)</button><br>

<button onclick="closeShop()">Close</button>
</div>

<script>

const c=document.getElementById("game");
const ctx=c.getContext("2d");

const keys={};
const mouse={x:0,y:0};

let shake=0;

let particles=[];
let enemies=[];
let bullets=[];

let wave=1;
let shopPhase=false;
let shopTimer=0;
let lastTick=Date.now();

let gameOver=false;

// 💰 MONEY SYSTEM (FIXED)
const player={
x:100,y:100,
size:28,
speed:4,
hp:100,
maxHp:100,
money:0,
weapon:"Plasma Handgun",
damage:12,
medkits:0
};

const shop={x:850,y:120,size:40};
const rift={x:450,y:300,size:120};

// ---------------- INPUT ----------------
document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

if(e.code==="Space") shoot();

if(e.key.toLowerCase()==="e") openShop();

if(e.key.toLowerCase()==="q"){
if(player.medkits>0 && player.hp<player.maxHp){
player.medkits--;
player.hp+=40;
if(player.hp>player.maxHp) player.hp=player.maxHp;
}
}
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

c.addEventListener("mousemove",e=>{
let r=c.getBoundingClientRect();
mouse.x=e.clientX-r.left;
mouse.y=e.clientY-r.top;
});

// ---------------- PARTICLES ----------------
function initParticles(){
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*1000,
y:Math.random()*700,
r:Math.random()*2,
s:Math.random()*1+0.2,
a:Math.random()
});
}
}
initParticles();

// ---------------- WAVES ----------------
function spawnWave(){
enemies=[];
let count=6+wave*5;

for(let i=0;i<count;i++){
enemies.push({
x:Math.random()*950,
y:Math.random()*650,
size:30,
hp:25+wave*18,
speed:1+wave*0.18,
damage:2+wave*2,
reward:Math.max(2,Math.floor((5+wave)/2))
});
}
}

// ---------------- SHOOT ----------------
function shoot(){
if(gameOver)return;

bullets.push({
x:player.x,
y:player.y,
dx:mouse.x-player.x,
dy:mouse.y-player.y,
speed:10,
dmg:player.damage
});
}

// ---------------- SHOP ----------------
function openShop(){
if(!shopPhase)return;
document.getElementById("shop").style.display="block";
document.getElementById("moneyText").innerText="Money: "+player.money;
}

function closeShop(){
document.getElementById("shop").style.display="none";
}

function buy(cost,type){
if(player.money<cost)return;

player.money-=cost;

if(type==="medkit") player.medkits++;
if(type==="blaster"){player.weapon="Plasma Blaster";player.damage=20;}
if(type==="rifle"){player.weapon="Plasma Rifle";player.damage=35;}
if(type==="cannon"){player.weapon="Rift Cannon";player.damage=70;}

document.getElementById("moneyText").innerText="Money: "+player.money;
}

// ---------------- UPDATE ----------------
function update(){

if(gameOver)return;

// movement
if(keys["w"])player.y-=player.speed;
if(keys["s"])player.y+=player.speed;
if(keys["a"])player.x-=player.speed;
if(keys["d"])player.x+=player.speed;

player.x=Math.max(0,Math.min(1000-player.size,player.x));
player.y=Math.max(0,Math.min(700-player.size,player.y));

// enemies AI
if(!shopPhase){
enemies.forEach(e=>{
if(e.hp<=0)return;

let dx=player.x-e.x;
let dy=player.y-e.y;
let d=Math.hypot(dx,dy);

e.x+=(dx/d)*e.speed;
e.y+=(dy/d)*e.speed;

if(d<28){
player.hp-=0.12+wave*0.04;
shake=5;
}
});
}

// bullets
bullets.forEach(b=>{
let d=Math.hypot(b.dx,b.dy);
b.x+=(b.dx/d)*b.speed;
b.y+=(b.dy/d)*b.speed;

enemies.forEach(e=>{
if(e.hp<=0)return;

if(b.x>e.x && b.x<e.x+e.size && b.y>e.y && b.y<e.y+e.size){
e.hp-=b.dmg;
b.dead=true;

if(e.hp<=0){
player.money+=e.reward; // 💰 FIXED MONEY GAIN
}
}
});
});

bullets=bullets.filter(b=>!b.dead);

// wave clear
let alive=enemies.filter(e=>e.hp>0);
if(alive.length===0&&!shopPhase){
shopPhase=true;
shopTimer=10;
lastTick=Date.now();
}

// shop timer
if(shopPhase){
if(Date.now()-lastTick>1000){
shopTimer--;
lastTick=Date.now();
}
if(shopTimer<=0){
shopPhase=false;
wave++;
spawnWave();
}
}

if(player.hp<=0)gameOver=true;
}

// ---------------- DRAW (GRAPHICS UPGRADE) ----------------
function draw(){

// camera shake
let ox=0,oy=0;
if(shake>0){
ox=(Math.random()-0.5)*shake;
oy=(Math.random()-0.5)*shake;
shake*=0.85;
}

ctx.save();
ctx.translate(ox,oy);

// background
ctx.fillStyle="#05050a";
ctx.fillRect(0,0,1000,700);

// particles
particles.forEach(p=>{
p.y+=p.s;
if(p.y>700)p.y=0;
ctx.fillStyle="rgba(160,0,255,"+p.a+")";
ctx.fillRect(p.x,p.y,p.r,p.r);
});

// rift glow
ctx.shadowColor="#b000ff";
ctx.shadowBlur=25;
ctx.fillStyle="#6a00ff";
ctx.fillRect(rift.x,rift.y,rift.size,rift.size);
ctx.shadowBlur=0;

// shop
ctx.shadowColor="lime";
ctx.shadowBlur=20;
ctx.fillStyle="lime";
ctx.fillRect(shop.x,shop.y,shop.size,shop.size);
ctx.shadowBlur=0;

ctx.fillStyle="white";
ctx.fillText("RIFT SHOP",shop.x-20,shop.y-10);

// enemies
enemies.forEach(e=>{
if(e.hp<=0)return;
ctx.shadowColor="red";
ctx.shadowBlur=15;
ctx.fillStyle="red";
ctx.fillRect(e.x,e.y,e.size,e.size);
});

// bullets
bullets.forEach(b=>{
ctx.shadowColor="cyan";
ctx.shadowBlur=20;
ctx.beginPath();
ctx.fillStyle="cyan";
ctx.arc(b.x,b.y,6,0,Math.PI*2);
ctx.fill();
});

// player
ctx.shadowColor="cyan";
ctx.shadowBlur=20;
ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.size,player.size);
ctx.shadowBlur=0;

// HUD
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("HP:"+Math.floor(player.hp),10,20);
ctx.fillText("Money:"+player.money,10,40);
ctx.fillText("Weapon:"+player.weapon,10,60);
ctx.fillText("Medkits:"+player.medkits,10,80);
ctx.fillText("Wave:"+wave,10,100);

if(shopPhase){
ctx.fillStyle="yellow";
ctx.fillText("SHOP PHASE: "+shopTimer,420,30);
}

// game over
if(gameOver){
ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(0,0,1000,700);
ctx.fillStyle="red";
ctx.font="40px Arial";
ctx.fillText("CONSUMED BY THE RIFT",200,350);
}

ctx.restore();
}

// ---------------- LOOP ----------------
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

spawnWave();
loop();

</script>
</body>
</html>
