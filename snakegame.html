<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snake Game</title>
<style>
  body {
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
  }

  h1 {
    margin: 10px;
  }

  canvas {
    background: #000;
    border: 2px solid #0ff;
  }

  .score {
    margin: 10px;
    font-size: 18px;
  }

  button {
    margin: 10px;
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Snake Game</h1>
<div class="score">Score: <span id="score">0</span></div>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="restartGame()">Restart</button>

<script>
  function playEatSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();

  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(700, audioCtx.currentTime);

  gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(
    0.001,
    audioCtx.currentTime + 0.1
  );

  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  oscillator.start();
  oscillator.stop(audioCtx.currentTime + 0.1);
}
function playLoseSound() {
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const notes = [300, 220, 150, 100];

  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.1, audioCtx.currentTime + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(
      0.001,
      audioCtx.currentTime + i * 0.12 + 0.1
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime + i * 0.12);
    osc.stop(audioCtx.currentTime + i * 0.12 + 0.1);
  });
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake, food, dx, dy, score, gameLoop;

function init() {
  snake = [{ x: 10, y: 10 }];
  dx = 1;
  dy = 0;
  score = 0;
  document.getElementById("score").textContent = score;
  placeFood();
}

function placeFood() {
  food = {
    x: Math.floor(Math.random() * tileCount),
    y: Math.floor(Math.random() * tileCount)
  };
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // draw food
  ctx.fillStyle = "red";
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

  // draw snake
  ctx.fillStyle = "lime";
  snake.forEach((segment, i) => {
    ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
  });

  let head = { x: snake[0].x + dx, y: snake[0].y + dy };

  // wall collision
  if (
    head.x < 0 || head.x >= tileCount ||
    head.y < 0 || head.y >= tileCount
  ) {
    return gameOver();
  }

  // self collision
  for (let segment of snake) {
    if (head.x === segment.x && head.y === segment.y) {
      return gameOver();
    }
  }

  snake.unshift(head);

  // eat food
  if (head.x === food.x && head.y === food.y) {
    playEatSound();
    score++;
    document.getElementById("score").textContent = score;
    placeFood();
  } else {
    snake.pop();
  }
}

function gameOver() {
  clearInterval(gameLoop);
  alert("Game Over! Score: " + score);
}
function gameOver() {
  playLoseSound();
  clearInterval(gameLoop);

  setTimeout(() => {
    alert("Game Over! Score: " + score);
  }, 100);
}

function restartGame() {
  clearInterval(gameLoop);
  init();
  gameLoop = setInterval(draw, 150);
}

// controls
document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "b") {
  score = 1000;
  document.getElementById("score").textContent = score;
}
  if (e.key === "w" && dy === 0) {
    dx = 0; dy = -1;
  }
  if (e.key === "s" && dy === 0) {
    dx = 0; dy = 1;
  }
  if (e.key === "a" && dx === 0) {
    dx = -1; dy = 0;
  }
  if (e.key === "d" && dx === 0) {
    dx = 1; dy = 0;
  }
});

init();
gameLoop = setInterval(draw, 150);
</script>

</body>
</html>
