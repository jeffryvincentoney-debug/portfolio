<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pong Game</title>

<style>
  /* =========================
     BASIC PAGE STYLING
  ========================= */
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 10px;
  }

  canvas {
    background: black;
    border: 2px solid #0ff;
  }

  .scoreboard {
    margin: 10px;
    font-size: 20px;
  }
</style>
</head>

<body>

<h1>Pong Game</h1>

<!-- SCORE DISPLAY -->
<div class="scoreboard">
  Player 1: <span id="score1">0</span>
  &nbsp;&nbsp;|&nbsp;&nbsp;
  Player 2: <span id="score2">0</span>
</div>

<!-- GAME SCREEN -->
<canvas id="game" width="600" height="400"></canvas>

<script>
  /* =========================
   SOUND EFFECTS
========================= */

function paddleSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "square";
  osc.frequency.value = 500;

  gain.gain.value = 0.08;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.05);
}

function wallSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = "triangle";
  osc.frequency.value = 300;

  gain.gain.value = 0.08;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  osc.stop(ctx.currentTime + 0.04);
}

function scoreSound() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();

  [600, 800].forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start(ctx.currentTime + i * 0.08);
    osc.stop(ctx.currentTime + i * 0.08 + 0.07);
  });
}
/* =========================
   CANVAS SETUP
========================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* =========================
   GAME OBJECTS
========================= */

const paddleWidth = 10;
const paddleHeight = 80;

let leftPaddle = {
  x: 10,
  y: 160,
  speed: 6
};

let rightPaddle = {
  x: canvas.width - 20,
  y: 160,
  speed: 6
};

let ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  speedX: 4,
  speedY: 3
};

/* =========================
   SCORE TRACKING
========================= */
let score1 = 0;
let score2 = 0;

const score1Display = document.getElementById("score1");
const score2Display = document.getElementById("score2");

/* =========================
   KEYBOARD CONTROLS
========================= */
let keys = {};

document.addEventListener("keydown", (e) => {
  keys[e.key] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key] = false;
});

/* =========================
   UPDATE GAME STATE
========================= */
function update() {
  // Left paddle (W/S)
  if (keys["w"] || keys["W"]) {
    leftPaddle.y -= leftPaddle.speed;
  }
  if (keys["s"] || keys["S"]) {
    leftPaddle.y += leftPaddle.speed;
  }

  // Right paddle (Arrow keys)
  if (keys["ArrowUp"]) {
    rightPaddle.y -= rightPaddle.speed;
  }
  if (keys["ArrowDown"]) {
    rightPaddle.y += rightPaddle.speed;
  }

  // Keep paddles inside screen
  leftPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, leftPaddle.y));
  rightPaddle.y = Math.max(0, Math.min(canvas.height - paddleHeight, rightPaddle.y));

  // Move ball
  ball.x += ball.speedX;
  ball.y += ball.speedY;

  // Top/bottom wall collision
  if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
    ball.speedY *= -1;
    wallSound();
  }

  // Paddle collision (left)
  if (
    ball.x - ball.radius < leftPaddle.x + paddleWidth &&
    ball.y > leftPaddle.y &&
    ball.y < leftPaddle.y + paddleHeight
  ) {
    ball.speedX *= -1;
    paddleSound();
    ball.x = leftPaddle.x + paddleWidth + ball.radius;
  }

  // Paddle collision (right)
  if (
    ball.x + ball.radius > rightPaddle.x &&
    ball.y > rightPaddle.y &&
    ball.y < rightPaddle.y + paddleHeight
  ) {
    ball.speedX *= -1;
    paddleSound();
    ball.x = rightPaddle.x - ball.radius;
  }

  // Score system
  if (ball.x < 0) {
    score2++;
    scoreSound();
    resetBall();
  }

  if (ball.x > canvas.width) {
    score1++;
    resetBall();
  }

  score1Display.textContent = score1;
  score2Display.textContent = score2;
}

/* =========================
   RESET BALL AFTER SCORE
========================= */
function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.speedX *= -1;
  ball.speedY = 3 * (Math.random() > 0.5 ? 1 : -1);
}

/* =========================
   DRAW EVERYTHING
========================= */
function draw() {
  // Clear screen
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw paddles
  ctx.fillStyle = "white";
  ctx.fillRect(leftPaddle.x, leftPaddle.y, paddleWidth, paddleHeight);
  ctx.fillRect(rightPaddle.x, rightPaddle.y, paddleWidth, paddleHeight);

  // Draw ball
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
}

/* =========================
   GAME LOOP
========================= */
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
