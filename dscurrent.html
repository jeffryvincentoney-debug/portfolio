<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rift Knight (Prototype)</title>
<style>
body{margin:0;overflow:hidden;background:#0b0b12;}
canvas{display:block;}
#ui{
position:absolute;top:10px;left:10px;
color:white;font-family:Arial;font-size:16px;
}
</style>
</head>
<body>

<div id="ui">
HP: <span id="hp"></span> | Money: <span id="m"></span>
</div>

<canvas id="c"></canvas>

<script>
    const bg = new Image();
bg.src = "background.png";
const idleImg = new Image();
idleImg.src = "lilDudeidle.png";

const walk1 = new Image();
walk1.src = "lilDudewalkanim1.png";

const walk2 = new Image();
walk2.src = "lilDudewalkanim2.png";

const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

const keys = {};
const mouse = { x:0, y:0 };

let camX = 0;

c.addEventListener("mousemove", e=>{
    const rect = c.getBoundingClientRect();
    mouse.x = e.clientX - rect.left + camX;
    mouse.y = e.clientY - rect.top;
});

addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;

    // PORTAL ENTER KEY
    if (e.key.toLowerCase() === "e" && nearPortal) {
        enterPortal();
    }
});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

const g = 0.8;

const player = {
x:100,y:200,w:40,h:60,
vx:0,vy:0,
speed:5,
jump:-14,
ground:false,
hp:100,
money:0,
inv:0,
dash:0,
facing:1,
attack:0
};

let frame = 0;
let frameTimer = 0;

const spawn = {x:100,y:200};

const platforms = [
{x:0,y:600,w:5000,h:600},
{x:400,y:450,w:200,h:20},
{x:800,y:380,w:200,h:20},
{x:1200,y:450,w:200,h:20},
{x:1600,y:350,w:200,h:20},
{x:2000,y:500,w:200,h:20}
];

const enemies = [
{x:600,y:520,w:40,h:40,hp:3},
{x:1000,y:340,w:40,h:40,hp:3},
{x:1500,y:410,w:40,h:40,hp:3}
];

const portalImg = new Image();
portalImg.src = "rift.png";

let world = 1;
let nearPortal = false;

const portal = {
    x:2800,
    y:480,
    w:120,
    h:120
};

const returnPortal = {
    x:300,
    y:480,
    w:120,
    h:120
};

function col(a,b){
return a.x < b.x+b.w &&
a.x+a.w > b.x &&
a.y < b.y+b.h &&
a.y+a.h > b.y;
}

function reset(){
    function enterPortal() {
    world++;

    // simple world switch effect
    if (world === 2) {
        spawn.x = 200;
        spawn.y = 200;

        player.x = spawn.x;
        player.y = spawn.y;

        // move portal somewhere else or change layout
        portal.x = 300;
        portal.y = 480;
    }

    reset();
}

player.x=spawn.x;
player.y=spawn.y;
player.vx=0;
player.vy=0;
player.hp=100;
camX=0;
}

function update(){

if(player.inv>0) player.inv--;
if(player.dash>0) player.dash--;
if(player.attack>0) player.attack--;

// movement speed
let sp = player.speed;
if(player.dash>0) sp = 12;

let moving = keys["a"] || keys["d"];

player.vx = 0;

if(keys["a"]){
player.vx = -sp;
player.facing = -1;
}
if(keys["d"]){
player.vx = sp;
player.facing = 1;
}

// animation logic
if(moving){
frameTimer++;
if(frameTimer > 10){
frame = (frame + 1) % 2;
frameTimer = 0;
}
}else{
frame = 0;
}

// jump
if(keys["w"] && player.ground){
player.vy = player.jump;
player.ground = false;
}

// dash
if(keys["shift"] && player.dash===0){
player.dash = 15;
player.inv = 15;
}

// gravity
player.vy += g;

player.x += player.vx;
player.y += player.vy;

player.ground = false;

// platforms
platforms.forEach(p=>{
if(player.x< p.x+p.w &&
player.x+player.w > p.x &&
player.y+player.h > p.y &&
player.y+player.h < p.y+30 &&
player.vy > 0){
player.y = p.y-player.h;
player.vy = 0;
player.ground = true;
}
});

// attack hitbox (mouse direction)
let dxm = mouse.x - player.x;
let dym = mouse.y - player.y;

let len = Math.sqrt(dxm*dxm + dym*dym);
if(len === 0) len = 1;

dxm /= len;
dym /= len;

const range = 90;

const hit = {
x: player.x + dxm * range,
y: player.y + dym * range,
w: 50,
h: 50
};

if(keys[" "] && player.attack===0){
player.attack = 12;
}

// enemies (NOW FLYING)
enemies.forEach(e=>{

if(e.hp<=0) return;

// FLY TOWARD PLAYER (NO GRAVITY)
let dx = player.x - e.x;
let dy = player.y - e.y;

let dist = Math.sqrt(dx*dx + dy*dy);
if(dist === 0) dist = 1;

dx /= dist;
dy /= dist;

e.x += dx * 1.8;
e.y += dy * 1.2;

// damage player
if(col(player,e) && player.inv===0){
player.hp -= 10;
player.inv = 40;

player.x += dx>0?-40:40;
}

// attack hit
if(player.attack>0 && col(hit,e)){
e.hp--;

player.inv = 10;

if(e.hp<=0){
player.money += 10;
e.hp = 3;
e.x += 600;
}
}
});

// death
if(player.hp<=0 || player.y>1200) reset();

// camera
camX += (player.x - camX - 300)*0.1;

// check portal proximity
nearPortal = col(player, portal);

// UI
document.getElementById("hp").innerText = player.hp;
document.getElementById("m").innerText = player.money;
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);

ctx.drawImage(bg, -camX *0, 0, c.width, c.height);

ctx.save();
ctx.translate(-camX,0);

// platforms
ctx.fillStyle="#7F7F7F";
platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h);
});

// PORTAL DRAW
ctx.drawImage(portalImg, portal.x, portal.y, portal.w, portal.h);

// enemies
ctx.fillStyle="crimson";
enemies.forEach(e=>{
if(e.hp<=0) return;
ctx.fillRect(e.x,e.y,e.w,e.h);
});

// PLAYER SPRITE ANIMATION
let img;

if(keys["a"] || keys["d"]){
    img = frame === 0 ? walk1 : walk2;
}else{
    img = idleImg;
}

ctx.save();

// flip if facing left
if(player.facing === -1){
    ctx.scale(-1, 1);
    ctx.drawImage(
        img,
        -player.x - player.w,
        player.y,
        player.w,
        player.h
    );
}else{
    ctx.drawImage(
        img,
        player.x,
        player.y,
        player.w,
        player.h
    );
}

ctx.restore();

// attack line
if(player.attack>0){
ctx.strokeStyle="yellow";
ctx.beginPath();
ctx.moveTo(player.x, player.y);
ctx.lineTo(mouse.x, mouse.y);
ctx.stroke();
}

ctx.restore();
}

function loop(){
    function touchingPortal(a,b){
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
